<script>
const firebaseConfig = {
  apiKey: "AIzaSyAe3A65fLSCR5OM5bS8iTc0get2vfX0HnQ",
  authDomain: "family-958f6.firebaseapp.com",
  databaseURL: "https://family-958f6-default-rtdb.firebaseio.com",
  projectId: "family-958f6",
  storageBucket: "family-958f6.firebasestorage.app",
  messagingSenderId: "297002821278",
  appId: "1:297002821278:web:49f14e9d1f609fa10c3d8f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const loginWrap = document.getElementById("loginWrap");
const appWrap = document.getElementById("appWrap");
const loginEmail = document.getElementById("loginEmail");
const loginPassword = document.getElementById("loginPassword");
const loginBtn = document.getElementById("loginBtn");
const signupBtn = document.getElementById("signupBtn");
const loginMsg = document.getElementById("loginMsg");
const currentUserLine = document.getElementById("currentUserLine");

function setLoginMsg(text, isError){
  loginMsg.textContent = text || "";
  loginMsg.style.color = isError ? "#ff4d4f" : "#666";
}

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(function(err){
  alert("Persistence Error: " + err.code + " | " + err.message);
});

signupBtn.addEventListener("click", async function(){
  const email = loginEmail.value.trim();
  const password = loginPassword.value;

  if(!email || !password){
    setLoginMsg("請輸入 email 同 password", true);
    return;
  }

  try{
    const result = await auth.createUserWithEmailAndPassword(email, password);
    setLoginMsg("註冊成功：" + result.user.email, false);
  }catch(err){
    setLoginMsg(err.code + " | " + err.message, true);
    alert("Signup Error: " + err.code + " | " + err.message);
  }
});

loginBtn.addEventListener("click", async function(){
  const email = loginEmail.value.trim();
  const password = loginPassword.value;

  if(!email || !password){
    setLoginMsg("請輸入 email 同 password", true);
    return;
  }

  try{
    const result = await auth.signInWithEmailAndPassword(email, password);
    setLoginMsg("登入成功：" + result.user.email, false);
  }catch(err){
    setLoginMsg(err.code + " | " + err.message, true);
    alert("Login Error: " + err.code + " | " + err.message);
  }
});

function logout(){
  auth.signOut().then(function(){
    loginPassword.value = "";
    setLoginMsg("已登出", false);
  }).catch(function(err){
    alert("Logout Error: " + err.code + " | " + err.message);
  });
}

auth.onAuthStateChanged(function(user){
  if(user){
    loginWrap.style.display = "none";
    appWrap.style.display = "block";
    if(currentUserLine){
      currentUserLine.textContent = "目前登入：" + (user.email || "");
    }
    setLoginMsg("");
  }else{
    loginWrap.style.display = "flex";
    appWrap.style.display = "none";
  }
});

window.logout = logout;
</script>
