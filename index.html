<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family App</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
body { font-family: sans-serif; margin:0; background:#f5f5f5; }
.container { padding:20px; }

input, textarea {
  width:100%; padding:10px; margin:5px 0;
  border-radius:8px; border:1px solid #ccc;
}

button {
  width:100%; padding:10px; margin-top:5px;
  background:#5c67f2; color:white;
  border:none; border-radius:8px;
}

.card {
  background:white; padding:15px;
  border-radius:12px; margin-bottom:15px;
}

.item {
  display:flex; justify-content:space-between;
  margin:5px 0;
}

.nav {
  position:fixed; bottom:0; width:100%;
  display:flex; background:white;
}

.nav div {
  flex:1; text-align:center; padding:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="container">
  <div class="card">
    <h3>登入</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">登入</button>
    <button onclick="signup()">註冊</button>
    <button onclick="logout()">登出</button>
    <div id="msg"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;" class="container">

<div class="card">
<h3>開支</h3>
<input id="amount" placeholder="金額">
<input id="note" placeholder="備註">
<button onclick="addExpense()">新增</button>
<div id="expenseList"></div>
</div>

<div class="card">
<h3>晚餐</h3>
<div id="result">?</div>
<button onclick="draw()">抽</button>
<input id="food">
<button onclick="addFood()">新增</button>
<div id="foodList"></div>
</div>

<div class="card">
<h3>存貨</h3>
<input id="stock">
<button onclick="addStock()">新增</button>
<div id="stockList"></div>
</div>

<div class="card">
<h3>備忘</h3>
<textarea id="memo"></textarea>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAe3A65fLSCR5OM5bS8iTc0get2vfX0HnQ",
  authDomain: "family-958f6.firebaseapp.com",
  databaseURL: "https://family-958f6-default-rtdb.firebaseio.com",
  projectId: "family-958f6"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();

/* LOGIN */
function signup(){
  auth.createUserWithEmailAndPassword(
    email.value, password.value
  ).catch(e=>msg.innerText=e.message);
}

function login(){
  auth.signInWithEmailAndPassword(
    email.value, password.value
  ).catch(e=>msg.innerText=e.message);
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user=>{
  if(user){
    loginBox.style.display="none";
    app.style.display="block";
  }else{
    loginBox.style.display="block";
    app.style.display="none";
  }
});

/* EXPENSE */
function addExpense(){
  db.ref("expenses").push({
    a: amount.value,
    n: note.value
  });
  amount.value=""; note.value="";
}

db.ref("expenses").on("value",s=>{
  let html="";
  s.forEach(c=>{
    const d=c.val();
    html+=`<div class="item">${d.a} ${d.n}</div>`;
  });
  expenseList.innerHTML=html;
});

/* FOOD */
let foods=[];
function addFood(){
  db.ref("foods").push(food.value);
  food.value="";
}

db.ref("foods").on("value",s=>{
  foods=[];
  let html="";
  s.forEach(c=>{
    foods.push(c.val());
    html+=`<div class="item">${c.val()}</div>`;
  });
  foodList.innerHTML=html;
});

function draw(){
  if(!foods.length)return;
  result.innerText = foods[Math.floor(Math.random()*foods.length)];
}

/* STOCK */
function addStock(){
  db.ref("stocks").push(stock.value);
  stock.value="";
}

db.ref("stocks").on("value",s=>{
  let html="";
  s.forEach(c=>{
    html+=`<div class="item">${c.val()}</div>`;
  });
  stockList.innerHTML=html;
});

/* MEMO */
memo.oninput = ()=>{
  db.ref("memo").set(memo.value);
};

db.ref("memo").on("value",s=>{
  memo.value = s.val() || "";
});
</script>

</body>
</html>
