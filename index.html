<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#5c67f2" />
  <title>家庭小工具</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <style>
    :root {
      --primary: #5c67f2;
      --primary-soft: #eef0ff;
      --danger: #ff4d4f;
      --success: #52c41a;
      --bg: #f3f5f9;
      --card: #ffffff;
      --text: #1f2328;
      --muted: #7a7f87;
      --line: #e8ebf0;
      --shadow: 0 8px 24px rgba(22, 29, 37, 0.08);
      --radius: 18px;
      --nav-h: 84px;
      --swipe-width: 90px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC",
        "Microsoft JhengHei", "Segoe UI", Roboto, "Helvetica Neue", Arial,
        sans-serif;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 16px 16px calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px);
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .title {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      line-height: 1.15;
    }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 12px;
    }

    .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--text);
      padding: 14px;
      font-size: 16px;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: #b8befb;
      box-shadow: 0 0 0 4px rgba(92, 103, 242, 0.08);
    }

    textarea {
      min-height: 110px;
      resize: none;
      line-height: 1.6;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      width: 100%;
      background: var(--primary);
      color: #fff;
    }

    .btn-soft {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .btn-success {
      background: var(--success);
      color: #fff;
    }

    .btn-danger {
      background: #fff1f1;
      color: var(--danger);
    }

    .header-btn {
      width: auto;
      padding: 10px 14px;
      border-radius: 12px;
      background: #f3f4f8;
      color: var(--text);
      font-size: 14px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row > * {
      flex: 1;
    }

    .row-tight {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .row-tight input,
    .row-tight textarea {
      flex: 1;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fafbff;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 900;
      line-height: 1.15;
    }

    .big-stat {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fafbff;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: #fcfcfd;
    }

    .item-main {
      flex: 1;
      min-width: 0;
    }

    .item-title {
      font-size: 16px;
      font-weight: 700;
      word-break: break-word;
    }

    .item-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
      word-break: break-word;
      line-height: 1.45;
    }

    .low {
      color: #ff4d4f;
      font-weight: 700;
    }

    .warn {
      color: #faad14;
      font-weight: 700;
    }

    .result {
      border: 1px solid #dbe9ff;
      border-radius: 18px;
      background: linear-gradient(180deg, #f7faff 0%, #eef6ff 100%);
      text-align: center;
      padding: 24px 16px;
      margin-bottom: 12px;
    }

    .result-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .result-text {
      font-size: 30px;
      font-weight: 900;
      color: var(--primary);
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      word-break: break-word;
      line-height: 1.25;
    }

    .result-desc {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      justify-content: center;
    }

    .nav-inner {
      width: min(520px, 100%);
      background: rgba(255, 255, 255, 0.96);
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 8px 8px calc(env(safe-area-inset-bottom) + 8px);
    }

    .nav-btn {
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      padding: 8px 4px;
      border-radius: 10px;
    }

    .nav-btn.active {
      color: var(--primary);
    }

    .banner {
      display: none;
      background: #fff7e6;
      color: #8a5a00;
      border: 1px solid #ffd591;
      padding: 12px 14px;
      border-radius: 14px;
      margin-bottom: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .banner.show {
      display: block;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      color: var(--muted);
    }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .cat-btn {
      background: #f7f8fb;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
    }

    .cat-btn.active {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: #cfd4ff;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 800;
    }

    .section-tag {
      font-size: 13px;
      color: var(--muted);
      text-align: right;
    }

    .swipe-row {
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fcfcfd;
    }

    .swipe-actions {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: var(--swipe-width);
      display: flex;
    }

    .swipe-delete-btn {
      width: 100%;
      border: none;
      border-radius: 0;
      background: var(--danger);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
    }

    .swipe-content {
      position: relative;
      z-index: 1;
      background: #fcfcfd;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transform: translateX(0);
      transition: transform 0.2s ease;
      touch-action: pan-y;
    }

    .swipe-row.open .swipe-content {
      transform: translateX(calc(var(--swipe-width) * -1));
    }

    .qty-box {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .qty-btn {
      width: 32px;
      height: 32px;
      padding: 0;
      border-radius: 50%;
      background: #eef0f4;
      color: #1f2328;
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
    }

    .qty-number {
      min-width: 28px;
      text-align: center;
      font-size: 16px;
      font-weight: 800;
    }

    .small-note {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }
  </style>
</head>
<body>

  <div id="loginWrap" class="wrap">
    <div class="card">
      <h1 class="title">登入</h1>
      <div class="sub">只限指定帳戶使用。</div>

      <div id="debugBanner" class="banner show">JS 已載入</div>

      <div class="field">
        <div class="label">Email</div>
        <input id="loginEmail" type="email" placeholder="你的 Gmail" />
      </div>

      <div class="field">
        <div class="label">Password</div>
        <input id="loginPassword" type="password" placeholder="密碼" />
      </div>

      <button id="loginBtn">登入</button>
      <div id="loginMsg" class="sub" style="margin-top:12px;"></div>
    </div>
  </div>

  <div id="appWrap" style="display:none;">
    <div class="wrap">
      <div id="errorBanner" class="banner"></div>

      <section id="page-expense" class="page active">
        <div class="card">
          <div class="header">
            <div>
              <h1 class="title">家庭開支</h1>
              <div class="sub">兩部手機共用同一份記錄</div>
            </div>
            <button id="logoutBtn1" class="header-btn">登出</button>
          </div>
        </div>

        <div class="card">
          <div class="field">
            <div class="label">預算</div>
            <div class="row-tight">
              <input id="budgetInput" type="number" placeholder="例如：5000" />
              <button id="saveBudgetBtn" style="width:auto;padding:14px 18px;">儲存</button>
            </div>
          </div>

          <div class="stats">
            <div class="stat">
              <div class="stat-label">預算</div>
              <div id="budgetTotal" class="stat-value">$0</div>
            </div>
            <div class="stat">
              <div class="stat-label">已用</div>
              <div id="expenseTotal" class="stat-value">$0</div>
            </div>
          </div>

          <div class="big-stat">
            <div class="stat-label">結餘</div>
            <div id="budgetRemain" class="stat-value">$0</div>
          </div>

          <div id="expenseLatest" class="sub" style="margin-top:10px;">最新記錄：—</div>
        </div>

        <div class="card">
          <div class="field">
            <div class="label">金額</div>
            <input id="amount" type="number" placeholder="例如：86" />
          </div>
          <div class="field">
            <div class="label">備註</div>
            <input id="note" type="text" placeholder="例如：買餸、交租、日用品" />
          </div>
          <div class="field">
            <div class="label">日期</div>
            <input id="expenseDate" type="date" />
          </div>
          <button id="addExpenseBtn">新增記錄</button>
        </div>

        <div class="card">
          <div class="label">開支列表</div>
          <div id="expenseList" class="list"></div>
        </div>
      </section>

      <section id="page-dinner" class="page">
        <div class="card">
          <div class="header">
            <div>
              <h1 class="title">今晚煮咩</h1>
              <div class="sub">可同時選多個類別抽選</div>
            </div>
            <button id="logoutBtn2" class="header-btn">登出</button>
          </div>
        </div>

        <div class="card">
          <div class="section-head">
            <div class="section-title">大類別</div>
            <div class="section-tag" id="currentDinnerCatLabel">未選擇</div>
          </div>
          <div id="dinnerCatGrid" class="cat-grid"></div>
        </div>

        <div class="card">
          <div class="result">
            <div class="result-label">隨機抽選結果</div>
            <div id="resultDisplay" class="result-text">請先選大類別</div>
            <div id="resultDesc" class="result-desc"></div>
          </div>
          <div class="row">
            <button id="drawBtn" class="btn-success">隨機抽選</button>
            <button id="redrawBtn" class="btn-soft">再抽一次</button>
          </div>
          <div style="height:10px;"></div>
          <button id="resetTodayBtn" class="btn-soft">重置今日抽過</button>
          <div class="small-note">再抽一次唔會重複上一次；今日抽過可重置</div>
        </div>

        <div class="card">
          <div class="section-head">
            <div class="section-title">加入菜式</div>
            <div class="section-tag" id="dinnerAddCatLabel">管理類別：海鮮</div>
          </div>
          <div class="field">
            <div class="label">菜式名稱</div>
            <input id="foodInput" type="text" placeholder="例如：洋蔥牛仔骨" />
          </div>
          <div class="field">
            <div class="label">簡單煮法</div>
            <textarea id="foodDescInput" placeholder="例如：先醃牛仔骨，煎香後加洋蔥炒至軟身"></textarea>
          </div>
          <button id="addFoodBtn">新增菜式</button>
        </div>

        <div class="card">
          <div class="section-head">
            <div class="section-title">菜式清單</div>
            <div class="section-tag" id="dinnerListCatLabel">管理類別：海鮮</div>
          </div>
          <div id="foodList" class="list"></div>
        </div>
      </section>

      <section id="page-stock" class="page">
        <div class="card">
          <div class="header">
            <div>
              <h1 class="title">存貨清單</h1>
              <div class="sub">低庫存會有提示</div>
            </div>
            <button id="logoutBtn3" class="header-btn">登出</button>
          </div>
        </div>

        <div class="card">
          <div class="section-head">
            <div class="section-title">分類</div>
            <div class="section-tag" id="currentStockCatLabel">未選擇</div>
          </div>
          <div id="stockCatGrid" class="cat-grid"></div>
        </div>

        <div class="card">
          <div class="section-head">
            <div class="section-title">新增項目</div>
            <div class="section-tag" id="stockAddCatLabel">請先選分類</div>
          </div>
          <div class="field">
            <div class="label">項目名稱</div>
            <input id="stockInput" type="text" placeholder="例如：可樂、雞翼、廁紙" />
          </div>
          <button id="addStockBtn">新增</button>
        </div>

        <div class="card">
          <div class="section-head">
            <div class="section-title">分類清單</div>
            <div class="section-tag" id="stockListCatLabel">請先選分類</div>
          </div>
          <div id="stockList" class="list"></div>
        </div>
      </section>

      <section id="page-memo" class="page">
        <div class="card">
          <div class="header">
            <div>
              <h1 class="title">備忘錄</h1>
              <div class="sub">一條一條新增，向左滑刪除</div>
            </div>
            <button id="logoutBtn4" class="header-btn">登出</button>
          </div>
        </div>

        <div class="card">
          <div class="field">
            <div class="label">新增備忘</div>
            <textarea id="memoInput" placeholder="例如：今晚記得解凍雞翼"></textarea>
          </div>
          <button id="addMemoBtn">新增備忘</button>
        </div>

        <div class="card">
          <div class="section-head">
            <div class="section-title">備忘清單</div>
            <div class="section-tag" id="memoCountLabel">0 項</div>
          </div>
          <div id="memoList" class="list"></div>
        </div>
      </section>
    </div>

    <nav class="nav">
      <div class="nav-inner">
        <button class="nav-btn active" data-page="expense">開支</button>
        <button class="nav-btn" data-page="dinner">晚餐</button>
        <button class="nav-btn" data-page="stock">存貨</button>
        <button class="nav-btn" data-page="memo">備忘</button>
      </div>
    </nav>
  </div>

  <script>

        databaseURL: "https://family-958f6-default-rtdb.firebaseio.com",
        projectId: "family-958f6",
        storageBucket: "family-958f6.firebasestorage.app",
        messagingSenderId: "297002821278",
        appId: "1:297002821278:web:49f14e9d1f609fa10c3d8f"

      firebase.initializeApp(firebaseConfig);

      const db = firebase.database();

      let initialized = false;

      const els = {

        foodDescInput: document.getElementById("foodDescInput"),
        addFoodBtn: document.getElementById("addFoodBtn"),
        foodList: document.getElementById("foodList"),

        stockCatGrid: document.getElementById("stockCatGrid"),
        currentStockCatLabel: document.getElementById("currentStockCatLabel"),
        stockAddCatLabel: document.getElementById("stockAddCatLabel"),

        stockInput: document.getElementById("stockInput"),

      function getDinnerCatLabel(id) {
        const found = DINNER_CATEGORIES.find(function (x) {
          return x.id === id;
        });
        return found ? found.label : "未選擇";
      }

      function getStockCatLabel(id) {
        const found = STOCK_CATEGORIES.find(function (x) {
          return x.id === id;
        });
        return found ? found.label : "未選擇";
      }

      function setError(msg) {
        if (!msg) {
          els.errorBanner.classList.remove("show");
          els.errorBanner.textContent = "";

      function todayStr() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + day;
      }

      function timeStr(ts) {
        if (!ts) return "未有內容";
        const d = new Date(ts);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        const h = String(d.getHours()).padStart(2, "0");
        const min = String(d.getMinutes()).padStart(2, "0");
        return y + "/" + m + "/" + day + " " + h + ":" + min;
      }

      function money(n) {
        return "$" + Number(n || 0).toLocaleString("en-US", {
          maximumFractionDigits: 2
        });
      }

      function esc(str) {
        return String(str || "").replace(/[&<>"']/g, function (s) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
          }[s];
        });
      }

      function rowsFromObj(obj) {
        return Object.keys(obj || {}).map(function (k) {
          return { id: k, value: obj[k] };
        });
      }

        const rows = rowsFromObj(expenseCache);
        const used = rows.reduce(function (sum, row) {

        const remain = Number(budgetCache || 0) - used;
        els.budgetRemain.textContent = money(remain);
        els.budgetRemain.style.color = remain < 0 ? "#ff4d4f" : "#1f2328";
      }

      function drawFood(isRedraw) {
        if (selectedDinnerCats.length === 0) {
          els.resultDisplay.textContent = "請先選分類"
          els.resultDesc.textContent = ""
          return
        }

        let pool = []

        selectedDinnerCats.forEach(function (cat) {
          const rows = rowsFromObj(dinnerCache[cat] || {})
          rows.forEach(function (row) {
            const excludeKey = cat + "__" + row.id
            if (!excludedToday[excludeKey]) {
              pool.push({
                ...row.value,
                id: row.id,
                cat: cat,
                excludeKey: excludeKey
              })
            }
          })
        })

        if (isRedraw && lastDrawKey && pool.length > 1) {
          pool = pool.filter(function (item) {
            return item.excludeKey !== lastDrawKey
          })
        }

        if (pool.length === 0) {
          els.resultDisplay.textContent = "今日已抽晒"
          els.resultDesc.textContent = ""
          return
        }

        const picked = pool[Math.floor(Math.random() * pool.length)]
        const names = pool.map(function (item) {
          return item.name || ""
        })

        let count = 0
        const timer = setInterval(function () {
          els.resultDisplay.textContent =
            names[Math.floor(Math.random() * names.length)] || "未有結果"
          els.resultDesc.textContent = ""
          count++
          if (count > 12) {
            clearInterval(timer)
            excludedToday[picked.excludeKey] = true
            lastDrawKey = picked.excludeKey
            els.resultDisplay.textContent = picked.name || "未有結果"
            els.resultDesc.textContent = picked.desc || ""
          }
        }, 60)
      }

      function attachSwipe(container, typeName, getIdAttrName) {
        let startX = 0;
        let startY = 0;
        let touchedRow = null;
        let moved = false;

        container.addEventListener(
          "touchstart",
          function (e) {
            const row = e.target.closest(".swipe-row");
            if (!row) return;
            touchedRow = row;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            moved = false;
          },
          { passive: true }
        );

        container.addEventListener(
          "touchmove",
          function (e) {
            if (!touchedRow) return;
            const dx = e.touches[0].clientX - startX;
            const dy = e.touches[0].clientY - startY;

            if (Math.abs(dy) > Math.abs(dx)) return;
            moved = true;
          },
          { passive: true }
        );

        container.addEventListener("touchend", function (e) {
          if (!touchedRow) return;

          const changed = e.changedTouches[0];
          const dx = changed.clientX - startX;
          const dy = changed.clientY - startY;
          const id = touchedRow.getAttribute(getIdAttrName);

          if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 35) {
            if (dx < 0) {
              closeAllSwipes();
              openSwipeKey = typeName + ":" + id;
              touchedRow.classList.add("open");
            } else {
              touchedRow.classList.remove("open");
              if (openSwipeKey === typeName + ":" + id) {
                openSwipeKey = null;
              }
            }
          } else if (!moved) {
            const insideButton = e.target.closest("button,input,label");
            if (!insideButton) {
              if (openSwipeKey === typeName + ":" + id) {
                openSwipeKey = null;
                renderByType(typeName);
              }
            }
          }

          touchedRow = null;
        });
      }

      function renderByType(typeName) {
        if (typeName === "food") renderDinnerItems();
        if (typeName === "stock") renderStocks();
        if (typeName === "memo") renderMemos();
      }

      attachSwipe(els.foodList, "food", "data-food-id");
      attachSwipe(els.stockList, "stock", "data-stock-id");
      attachSwipe(els.memoList, "memo", "data-memo-id");

      document.addEventListener("click", function (e) {
        const insideSwipe = e.target.closest(".swipe-row");
        if (!insideSwipe) {
          closeAllSwipes();
        }
      });

      auth.onAuthStateChanged(function (user) {
        if (user) {
          if (!ALLOWED_EMAILS.includes(user.email)) {
            alert("你無權使用");
            auth.signOut();
            return;
          }

          els.loginWrap.style.display = "none";
          els.appWrap.style.display = "block";
          initApp();
        } else {
          els.loginWrap.style.display = "block";
          els.appWrap.style.display = "none";
        }
      });
    });
  </script>
</body>
</html>
