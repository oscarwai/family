<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#5c67f2">
  <title>家庭小工具</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <style>
    :root{
      --primary:#5c67f2;
      --primary-soft:#eef0ff;
      --danger:#ff4d4f;
      --success:#52c41a;
      --bg:#f3f5f9;
      --card:#ffffff;
      --text:#1f2328;
      --muted:#7a7f87;
      --line:#e8ebf0;
      --shadow:0 8px 24px rgba(22, 29, 37, 0.08);
      --radius:18px;
      --nav-h:84px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text)}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    }

    .app{
      max-width:520px;
      margin:0 auto;
      min-height:100vh;
      padding:
        calc(env(safe-area-inset-top) + 16px)
        16px
        calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px);
    }

    .page{display:none}
    .page.active{display:block;animation:fadeIn .24s ease}

    .header{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      margin:4px 2px 18px;
    }

    .title{
      font-size:30px;
      font-weight:800;
      letter-spacing:.2px;
      line-height:1.15;
      margin:0;
    }

    .subtitle{
      margin-top:6px;
      font-size:13px;
      color:var(--muted);
      line-height:1.4;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:14px;
    }

    .card-title{
      font-size:16px;
      font-weight:800;
      margin:0 0 12px;
    }

    .label{
      font-size:13px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .field{margin-bottom:12px}

    input, textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      color:var(--text);
      padding:14px;
      font-size:16px;
      outline:none;
      box-shadow:none;
    }

    input:focus, textarea:focus{
      border-color:#b8befb;
      box-shadow:0 0 0 4px rgba(92,103,242,.08);
    }

    textarea{
      min-height:280px;
      resize:none;
      line-height:1.6;
    }

    .btn{
      border:none;
      width:100%;
      padding:14px 16px;
      border-radius:14px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
    }

    .btn-primary{background:var(--primary);color:#fff}
    .btn-success{background:var(--success);color:#fff}
    .btn-soft{background:var(--primary-soft);color:var(--primary)}

    .btn-row{
      display:flex;
      gap:10px;
    }

    .btn-row .btn{flex:1}

    .split{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .split input{flex:1}

    .result-box{
      background:linear-gradient(180deg,#f7faff 0%, #eef6ff 100%);
      border:1px solid #dbe9ff;
      border-radius:18px;
      text-align:center;
      padding:24px 16px;
      margin-bottom:12px;
    }

    .result-label{
      font-size:13px;
      color:var(--muted);
      margin-bottom:10px;
    }

    .result-text{
      font-size:30px;
      font-weight:900;
      color:var(--primary);
      line-height:1.2;
      min-height:72px;
      display:flex;
      align-items:center;
      justify-content:center;
      word-break:break-word;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .empty{
      background:#fafbfc;
      border:1px dashed var(--line);
      border-radius:14px;
      padding:16px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }

    .item{
      border:1px solid var(--line);
      background:#fcfcfd;
      border-radius:14px;
      padding:13px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .item-main{
      min-width:0;
      flex:1;
    }

    .item-title{
      font-size:16px;
      font-weight:700;
      line-height:1.3;
      word-break:break-word;
    }

    .item-sub{
      margin-top:6px;
      font-size:13px;
      color:var(--muted);
      line-height:1.35;
      word-break:break-word;
    }

    .item-right{
      display:flex;
      align-items:center;
      gap:8px;
      flex-shrink:0;
    }

    .small-btn{
      border:none;
      background:transparent;
      color:var(--danger);
      font-size:14px;
      font-weight:800;
      padding:6px 4px;
      cursor:pointer;
      width:auto;
    }

    .toggle{
      position:relative;
      width:52px;
      height:32px;
      flex-shrink:0;
    }

    .toggle input{display:none}
    .slider{
      position:absolute;
      inset:0;
      background:#d7dbe2;
      border-radius:999px;
      transition:.22s ease;
      cursor:pointer;
    }

    .slider:before{
      content:"";
      position:absolute;
      width:28px;
      height:28px;
      border-radius:50%;
      left:2px;
      top:2px;
      background:#fff;
      box-shadow:0 1px 4px rgba(0,0,0,.16);
      transition:.22s ease;
    }

    .toggle input:checked + .slider{background:var(--success)}
    .toggle input:checked + .slider:before{transform:translateX(20px)}

    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .stat{
      border:1px solid var(--line);
      background:#fafbff;
      border-radius:16px;
      padding:14px;
    }

    .stat-label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .stat-value{
      font-size:26px;
      font-weight:900;
      line-height:1.15;
    }

    .stat-note{
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
    }

    .footer-line{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:12px;
      font-size:12px;
      color:var(--muted);
    }

    .nav{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      display:flex;
      justify-content:center;
      pointer-events:none;
    }

    .nav-inner{
      pointer-events:auto;
      width:min(520px,100%);
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(16px);
      border-top:1px solid rgba(0,0,0,.06);
      display:grid;
      grid-template-columns:repeat(4,1fr);
      padding:8px 8px calc(env(safe-area-inset-bottom) + 8px);
    }

    .nav-item{
      border:none;
      background:transparent;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:8px 4px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }

    .nav-item.active{color:var(--primary)}
    .nav-icon{font-size:20px;line-height:1}

    @keyframes fadeIn{
      from{opacity:0;transform:translateY(8px)}
      to{opacity:1;transform:translateY(0)}
    }

    @media (max-width:360px){
      .title{font-size:26px}
      .result-text{font-size:26px}
      .stat-value{font-size:22px}
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="page active" id="page-expense">
      <div class="header">
        <div>
          <h1 class="title">家庭開支</h1>
          <div class="subtitle">兩部手機共用同一份記錄</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">支出統計</div>
        <div class="stats">
          <div class="stat">
            <div class="stat-label">總支出</div>
            <div class="stat-value" id="expenseTotal">$0</div>
          </div>
          <div class="stat">
            <div class="stat-label">記錄數量</div>
            <div class="stat-value" id="expenseCount">0</div>
          </div>
        </div>
        <div class="stat-note" id="expenseLatest">最新記錄：—</div>
      </div>

      <div class="card">
        <div class="card-title">新增開支</div>
        <div class="field">
          <div class="label">金額</div>
          <input type="number" id="amount" placeholder="例如：86">
        </div>
        <div class="field">
          <div class="label">備註</div>
          <input type="text" id="note" placeholder="例如：買餸、交租、日用品">
        </div>
        <button class="btn btn-primary" id="addExpenseBtn">新增記錄</button>
      </div>

      <div class="card">
        <div class="card-title">開支列表</div>
        <div class="list" id="expenseList"></div>
      </div>
    </section>

    <section class="page" id="page-dinner">
      <div class="header">
        <div>
          <h1 class="title">今晚煮咩</h1>
          <div class="subtitle">雲端同步晚餐菜單</div>
        </div>
      </div>

      <div class="card">
        <div class="result-box">
          <div class="result-label">隨機抽選結果</div>
          <div class="result-text" id="resultDisplay">🎲 準備好未？</div>
        </div>
        <div class="btn-row">
          <button class="btn btn-success" id="drawBtn">隨機抽選</button>
          <button class="btn btn-soft" id="redrawBtn">再抽一次</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">加入菜式</div>
        <div class="split">
          <input type="text" id="foodInput" placeholder="例如：洋蔥牛仔骨">
          <button class="btn btn-primary" id="addFoodBtn" style="width:auto;padding-inline:18px">新增</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">菜式清單</div>
        <div class="list" id="foodList"></div>
      </div>
    </section>

    <section class="page" id="page-stock">
      <div class="header">
        <div>
          <h1 class="title">存貨清單</h1>
          <div class="subtitle">開關式顯示，開 = 屋企有</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">新增食材 / 用品</div>
        <div class="split">
          <input type="text" id="stockInput" placeholder="例如：雞蛋、豆腐、廁紙">
          <button class="btn btn-primary" id="addStockBtn" style="width:auto;padding-inline:18px">新增</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">存貨列表</div>
        <div class="list" id="stockList"></div>
      </div>
    </section>

    <section class="page" id="page-memo">
      <div class="header">
        <div>
          <h1 class="title">備忘錄</h1>
          <div class="subtitle">輸入後即時自動保存到雲端</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">共用備忘</div>
        <textarea id="memoInput" placeholder="寫下任何事，例如：
今晚記得解凍雞翼
買廁紙
星期六去超市"></textarea>
        <div class="footer-line">
          <span id="memoStatus">最後更新：未有內容</span>
          <button class="small-btn" id="clearMemoBtn">清空</button>
        </div>
      </div>
    </section>
  </div>

  <nav class="nav">
    <div class="nav-inner">
      <button class="nav-item active" data-page="expense">
        <div class="nav-icon">💰</div>
        <div>開支</div>
      </button>
      <button class="nav-item" data-page="dinner">
        <div class="nav-icon">🍳</div>
        <div>晚餐</div>
      </button>
      <button class="nav-item" data-page="stock">
        <div class="nav-icon">📦</div>
        <div>存貨</div>
      </button>
      <button class="nav-item" data-page="memo">
        <div class="nav-icon">📝</div>
        <div>備忘</div>
      </button>
    </div>
  </nav>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAe3A65fLSCR5OM5bS8iTc0get2vfX0HnQ",
      authDomain: "family-958f6.firebaseapp.com",
      projectId: "family-958f6",
      storageBucket: "family-958f6.firebasestorage.app",
      messagingSenderId: "297002821278",
      appId: "1:297002821278:web:49f14e9d1f609fa10c3d8f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const defaultFoods = [
      "洋蔥牛仔骨","煎豬扒","焗雞扒","手撕雞","雞翼","三文魚","煎蛋","炒蛋","炒肉碎","蒸水蛋","蒸魚","食海鮮"
    ];

    const defaultStocks = [
      { name:"雞蛋", on:true },
      { name:"洋蔥", on:true },
      { name:"雞翼", on:false },
      { name:"三文魚", on:false },
      { name:"豬扒", on:false },
      { name:"豆腐", on:false },
      { name:"米", on:true },
      { name:"麵", on:true },
      { name:"廁紙", on:true }
    ];

    let expenseCache = [];
    let foodCache = [];
    let stockCache = [];
    let memoTypingTimer = null;

    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g, function(s){
        return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s];
      });
    }

    function formatMoney(n){
      return "$" + Number(n || 0).toLocaleString("en-US", { maximumFractionDigits: 2 });
    }

    function formatDateTime(ts){
      if(!ts) return "未有內容";
      const d = new Date(ts);
      if(isNaN(d)) return "未有內容";
      const y = d.getFullYear();
      const m = d.getMonth() + 1;
      const day = d.getDate();
      const h = String(d.getHours()).padStart(2, "0");
      const min = String(d.getMinutes()).padStart(2, "0");
      return y + "/" + m + "/" + day + " " + h + ":" + min;
    }

    document.querySelectorAll(".nav-item").forEach(function(btn){
      btn.addEventListener("click", function(){
        const page = btn.dataset.page;
        document.querySelectorAll(".nav-item").forEach(function(n){ n.classList.remove("active"); });
        btn.classList.add("active");
        document.querySelectorAll(".page").forEach(function(p){ p.classList.remove("active"); });
        document.getElementById("page-" + page).classList.add("active");
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });

    db.ref("foods").once("value", function(s){
      if(!s.exists()) db.ref("foods").set(defaultFoods);
    });

    db.ref("stocks").once("value", function(s){
      if(!s.exists()) db.ref("stocks").set(defaultStocks);
    });

    document.getElementById("addExpenseBtn").addEventListener("click", function(){
      const amountEl = document.getElementById("amount");
      const noteEl = document.getElementById("note");
      const amount = amountEl.value.trim();
      const note = noteEl.value.trim();

      if(!amount || Number(amount) <= 0) return;

      const item = { a: amount, n: note, ts: Date.now() };

      db.ref("expenses").once("value", function(s){
        const list = s.val() || [];
        list.push(item);
        db.ref("expenses").set(list).then(function(){
          amountEl.value = "";
          noteEl.value = "";
        });
      });
    });

    function deleteExpense(index){
      const list = expenseCache.slice();
      list.splice(index, 1);
      db.ref("expenses").set(list);
    }

    db.ref("expenses").on("value", function(s){
      expenseCache = s.val() || [];
      const listEl = document.getElementById("expenseList");
      const totalEl = document.getElementById("expenseTotal");
      const countEl = document.getElementById("expenseCount");
      const latestEl = document.getElementById("expenseLatest");

      if(expenseCache.length === 0){
        listEl.innerHTML = '<div class="empty">未有開支記錄</div>';
        totalEl.textContent = "$0";
        countEl.textContent = "0";
        latestEl.textContent = "最新記錄：—";
        return;
      }

      const total = expenseCache.reduce(function(sum, item){
        return sum + Number(item.a || 0);
      }, 0);

      totalEl.textContent = formatMoney(total);
      countEl.textContent = String(expenseCache.length);

      const latest = expenseCache[expenseCache.length - 1];
      latestEl.textContent = "最新記錄：" + (latest.n ? latest.n : formatMoney(latest.a));

      const reversed = expenseCache.slice().reverse();
      listEl.innerHTML = reversed.map(function(item, reversedIndex){
        const realIndex = expenseCache.length - 1 - reversedIndex;
        return '<div class="item"><div class="item-main"><div class="item-title">' + formatMoney(item.a) + '</div><div class="item-sub">' + (item.n ? escapeHtml(item.n) : "無備註") + '</div></div><div class="item-right"><button class="small-btn" onclick="deleteExpense(' + realIndex + ')">刪除</button></div></div>';
      }).join("");
    });

    document.getElementById("addFoodBtn").addEventListener("click", function(){
      const input = document.getElementById("foodInput");
      const value = input.value.trim();
      if(!value) return;

      db.ref("foods").once("value", function(s){
        const list = s.val() || [];
        list.push(value);
        db.ref("foods").set(list).then(function(){
          input.value = "";
        });
      });
    });

    function deleteFood(index){
      const list = foodCache.slice();
      list.splice(index, 1);
      db.ref("foods").set(list);
    }

    function drawFood(){
      if(foodCache.length === 0){
        document.getElementById("resultDisplay").textContent = "請先加入菜式";
        return;
      }

      const display = document.getElementById("resultDisplay");
      let count = 0;
      const timer = setInterval(function(){
        display.textContent = foodCache[Math.floor(Math.random() * foodCache.length)];
        count++;
        if(count > 12){
          clearInterval(timer);
          display.style.color = "#ff4d4f";
          setTimeout(function(){
            display.style.color = "var(--primary)";
          }, 900);
        }
      }, 60);
    }

    document.getElementById("drawBtn").addEventListener("click", drawFood);
    document.getElementById("redrawBtn").addEventListener("click", drawFood);

    db.ref("foods").on("value", function(s){
      foodCache = s.val() || [];
      const listEl = document.getElementById("foodList");

      if(foodCache.length === 0){
        listEl.innerHTML = '<div class="empty">未有菜式</div>';
        return;
      }

      const reversed = foodCache.slice().reverse();
      listEl.innerHTML = reversed.map(function(item, reversedIndex){
        const realIndex = foodCache.length - 1 - reversedIndex;
        return '<div class="item"><div class="item-main"><div class="item-title">' + escapeHtml(item) + '</div></div><div class="item-right"><button class="small-btn" onclick="deleteFood(' + realIndex + ')">刪除</button></div></div>';
      }).join("");
    });

    document.getElementById("addStockBtn").addEventListener("click", function(){
      const input = document.getElementById("stockInput");
      const value = input.value.trim();
      if(!value) return;

      db.ref("stocks").once("value", function(s){
        const list = s.val() || [];
        list.push({ name:value, on:true });
        db.ref("stocks").set(list).then(function(){
          input.value = "";
        });
      });
    });

    function toggleStock(index){
      const list = stockCache.slice();
      list[index].on = !list[index].on;
      db.ref("stocks").set(list);
    }

    function deleteStock(index){
      const list = stockCache.slice();
      list.splice(index, 1);
      db.ref("stocks").set(list);
    }

    db.ref("stocks").on("value", function(s){
      stockCache = s.val() || [];
      const listEl = document.getElementById("stockList");

      if(stockCache.length === 0){
        listEl.innerHTML = '<div class="empty">未有存貨項目</div>';
        return;
      }

      const reversed = stockCache.slice().reverse();
      listEl.innerHTML = reversed.map(function(item, reversedIndex){
        const realIndex = stockCache.length - 1 - reversedIndex;
        const name = typeof item === "string" ? item : item.name;
        const on = typeof item === "string" ? true : !!item.on;

        return '<div class="item"><div class="item-main"><div class="item-title">' + escapeHtml(name) + '</div><div class="item-sub">' + (on ? "屋企有" : "屋企冇") + '</div></div><div class="item-right"><label class="toggle"><input type="checkbox" ' + (on ? "checked" : "") + ' onchange="toggleStock(' + realIndex + ')"><span class="slider"></span></label><button class="small-btn" onclick="deleteStock(' + realIndex + ')">刪除</button></div></div>';
      }).join("");
    });

    const memoInput = document.getElementById("memoInput");
    const memoStatus = document.getElementById("memoStatus");
    const clearMemoBtn = document.getElementById("clearMemoBtn");

    memoInput.addEventListener("input", function(){
      clearTimeout(memoTypingTimer);
      memoTypingTimer = setTimeout(function(){
        db.ref("memo").set({
          text: memoInput.value,
          updatedAt: Date.now()
        });
      }, 180);
    });

    clearMemoBtn.addEventListener("click", function(){
      db.ref("memo").set({
        text: "",
        updatedAt: Date.now()
      });
    });

    db.ref("memo").on("value", function(s){
      const data = s.val() || { text:"", updatedAt:null };
      if(document.activeElement !== memoInput){
        memoInput.value = data.text || "";
      }
      memoStatus.textContent = "最後更新：" + formatDateTime(data.updatedAt);
    });

    window.deleteExpense = deleteExpense;
    window.deleteFood = deleteFood;
    window.toggleStock = toggleStock;
    window.deleteStock = deleteStock;
  </script>
</body>
</html>
