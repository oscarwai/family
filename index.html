<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#5c67f2">
  <title>家庭小工具</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    :root{
      --primary:#5c67f2;
      --primary-soft:#eef0ff;
      --danger:#ff4d4f;
      --success:#52c41a;
      --bg:#f3f5f9;
      --card:#ffffff;
      --text:#1f2328;
      --muted:#7a7f87;
      --line:#e8ebf0;
      --shadow:0 8px 24px rgba(22,29,37,.08);
      --radius:18px;
      --nav-h:84px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text)}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    }
    .app-shell{
      max-width:520px;
      margin:0 auto;
      min-height:100vh;
      padding:calc(env(safe-area-inset-top) + 16px) 16px calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px);
    }
    .login-wrap{
      max-width:520px;
      margin:0 auto;
      min-height:100vh;
      padding:calc(env(safe-area-inset-top) + 20px) 16px 20px;
      display:flex;
      align-items:center;
    }
    .page{display:none}
    .page.active{display:block}
    .header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin:4px 2px 18px;
    }
    .title{
      font-size:30px;
      font-weight:800;
      line-height:1.15;
      margin:0;
    }
    .subtitle{
      margin-top:6px;
      font-size:13px;
      color:var(--muted);
      line-height:1.4;
    }
    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:14px;
    }
    .card-title{
      font-size:16px;
      font-weight:800;
      margin:0 0 12px;
    }
    .field{margin-bottom:12px}
    .label{
      font-size:13px;
      color:var(--muted);
      margin-bottom:8px;
    }
    input, textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      color:var(--text);
      padding:14px;
      font-size:16px;
      outline:none;
    }
    input:focus, textarea:focus{
      border-color:#b8befb;
      box-shadow:0 0 0 4px rgba(92,103,242,.08);
    }
    textarea{
      min-height:280px;
      resize:none;
      line-height:1.6;
    }
    .btn{
      border:none;
      width:100%;
      padding:14px 16px;
      border-radius:14px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
    }
    .btn-primary{background:var(--primary);color:#fff}
    .btn-success{background:var(--success);color:#fff}
    .btn-soft{background:var(--primary-soft);color:var(--primary)}
    .btn-row{
      display:flex;
      gap:10px;
    }
    .btn-row .btn{flex:1}
    .split{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .split input{flex:1}
    .result-box{
      background:linear-gradient(180deg,#f7faff 0%,#eef6ff 100%);
      border:1px solid #dbe9ff;
      border-radius:18px;
      text-align:center;
      padding:24px 16px;
      margin-bottom:12px;
    }
    .result-label{
      font-size:13px;
      color:var(--muted);
      margin-bottom:10px;
    }
    .result-text{
      font-size:30px;
      font-weight:900;
      color:var(--primary);
      line-height:1.2;
      min-height:72px;
      display:flex;
      align-items:center;
      justify-content:center;
      word-break:break-word;
    }
    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .empty{
      background:#fafbfc;
      border:1px dashed var(--line);
      border-radius:14px;
      padding:16px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }
    .item{
      border:1px solid var(--line);
      background:#fcfcfd;
      border-radius:14px;
      padding:13px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .item-main{
      min-width:0;
      flex:1;
    }
    .item-title{
      font-size:16px;
      font-weight:700;
      line-height:1.3;
      word-break:break-word;
    }
    .item-sub{
      margin-top:6px;
      font-size:13px;
      color:var(--muted);
      line-height:1.35;
      word-break:break-word;
    }
    .item-right{
      display:flex;
      align-items:center;
      gap:8px;
      flex-shrink:0;
    }
    .small-btn{
      border:none;
      background:transparent;
      color:var(--danger);
      font-size:14px;
      font-weight:800;
      padding:6px 4px;
      cursor:pointer;
      width:auto;
    }
    .toggle{
      position:relative;
      width:52px;
      height:32px;
      flex-shrink:0;
    }
    .toggle input{display:none}
    .slider{
      position:absolute;
      inset:0;
      background:#d7dbe2;
      border-radius:999px;
      transition:.22s ease;
      cursor:pointer;
    }
    .slider:before{
      content:"";
      position:absolute;
      width:28px;
      height:28px;
      border-radius:50%;
      left:2px;
      top:2px;
      background:#fff;
      box-shadow:0 1px 4px rgba(0,0,0,.16);
      transition:.22s ease;
    }
    .toggle input:checked + .slider{background:var(--success)}
    .toggle input:checked + .slider:before{transform:translateX(20px)}
    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .stat{
      border:1px solid var(--line);
      background:#fafbff;
      border-radius:16px;
      padding:14px;
    }
    .stat-label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
    }
    .stat-value{
      font-size:26px;
      font-weight:900;
      line-height:1.15;
    }
    .stat-note{
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
    }
    .footer-line{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:12px;
      font-size:12px;
      color:var(--muted);
    }
    .nav{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      display:flex;
      justify-content:center;
    }
    .nav-inner{
      width:min(520px,100%);
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(16px);
      border-top:1px solid rgba(0,0,0,.06);
      display:grid;
      grid-template-columns:repeat(4,1fr);
      padding:8px 8px calc(env(safe-area-inset-bottom) + 8px);
    }
    .nav-item{
      border:none;
      background:transparent;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:8px 4px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }
    .nav-item.active{color:var(--primary)}
    .nav-icon{font-size:20px;line-height:1}
    .banner{
      display:none;
      margin-bottom:14px;
      padding:12px 14px;
      border-radius:14px;
      background:#fff7e6;
      color:#8a5a00;
      border:1px solid #ffd591;
      line-height:1.5;
      font-size:14px;
    }
    .banner.show{display:block}
    .login-card{width:100%}
    .login-top{margin-bottom:18px}
    .login-title{
      margin:0;
      font-size:30px;
      font-weight:800;
      line-height:1.15;
    }
    .login-sub{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }
    .login-msg{
      margin-top:12px;
      font-size:14px;
      color:var(--danger);
      min-height:20px;
      line-height:1.5;
      word-break:break-word;
      white-space:pre-wrap;
    }
    .user-line{
      font-size:13px;
      color:var(--muted);
      margin-top:10px;
    }
    .header-actions{
      display:flex;
      gap:8px;
      align-items:center;
      flex-shrink:0;
    }
    .header-btn{
      width:auto;
      border:none;
      background:#f3f4f8;
      color:var(--text);
      padding:10px 14px;
      border-radius:12px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      white-space:nowrap;
    }
    @media (max-width:360px){
      .title,.login-title{font-size:26px}
      .result-text{font-size:26px}
      .stat-value{font-size:22px}
      .header-btn{padding:9px 12px;font-size:13px}
    }
  </style>
</head>
<body>

  <div id="loginWrap" class="login-wrap">
    <div class="card login-card">

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAe3A65fLSCR5OM5bS8iTc0get2vfX0HnQ",
  authDomain: "family-958f6.firebaseapp.com",
  databaseURL: "https://family-958f6-default-rtdb.firebaseio.com",
  projectId: "family-958f6",

  messagingSenderId: "297002821278",

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const loginWrap = document.getElementById("loginWrap");
const appWrap = document.getElementById("appWrap");
const loginEmail = document.getElementById("loginEmail");
const loginPassword = document.getElementById("loginPassword");
const loginBtn = document.getElementById("loginBtn");
const signupBtn = document.getElementById("signupBtn");
const loginMsg = document.getElementById("loginMsg");
const currentUserLine = document.getElementById("currentUserLine");

let expenseCache = {};
let foodCache = {};
let stockCache = {};
let budgetCache = 0;
let memoTypingTimer = null;
let initialized = false;

const defaultFoods = [

  "煎蛋","炒蛋","炒肉碎","蒸水蛋","蒸魚","食海鮮"

function showError(msg){
  const banner = document.getElementById("errorBanner");
  banner.textContent = msg;
  banner.classList.add("show");
}

function clearError(){
  document.getElementById("errorBanner").classList.remove("show");
}

function setLoginMsg(msg, isError){
  loginMsg.textContent = msg || "";
  loginMsg.style.color = isError ? "#ff4d4f" : "#666";
}

function handleError(err){
  console.error(err);
  showError("雲端資料未連接成功。請確認你已登入正確帳戶，Authentication 已開 Email/Password，Database Rules 已容許該 email。");
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, function(s){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s];
  });
}

function formatMoney(n){
  return "$" + Number(n || 0).toLocaleString("en-US", { maximumFractionDigits: 2 });
}

function formatDateTime(ts){
  if(!ts) return "未有內容";
  const d = new Date(ts);
  if(isNaN(d)) return "未有內容";
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  const h = String(d.getHours()).padStart(2, "0");
  const min = String(d.getMinutes()).padStart(2, "0");
  return y + "/" + m + "/" + day + " " + h + ":" + min;
}

function getTodayString(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return y + "-" + m + "-" + day;
}

function valuesFromObject(obj){
  if(!obj) return [];
  return Object.entries(obj).map(function(pair){
    return { id: pair[0], value: pair[1] };
  });
}

function updateBudgetRemain(){
  const rows = valuesFromObject(expenseCache);
  const totalExpense = rows.reduce(function(sum, row){
    return sum + Number((row.value && row.value.a) || 0);
  }, 0);

  const remain = Number(budgetCache || 0) - totalExpense;
  const remainEl = document.getElementById("budgetRemain");
  if(remainEl){
    remainEl.textContent = formatMoney(remain);
    remainEl.style.color = remain < 0 ? "#ff4d4f" : "#1f2328";
  }
}

document.querySelectorAll(".nav-item").forEach(function(btn){
  btn.addEventListener("click", function(){
    const page = btn.dataset.page;
    document.querySelectorAll(".nav-item").forEach(function(n){ n.classList.remove("active"); });
    btn.classList.add("active");
    document.querySelectorAll(".page").forEach(function(p){ p.classList.remove("active"); });
    document.getElementById("page-" + page).classList.add("active");
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
});

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(function(err){
  alert("Persistence Error: " + err.code + " | " + err.message);
});

signupBtn.addEventListener("click", async function(){
  const email = loginEmail.value.trim();
  const password = loginPassword.value;

  if(!email || !password){
    setLoginMsg("請輸入 email 同 password", true);
    return;
  }

  try{
    const result = await auth.createUserWithEmailAndPassword(email, password);
    setLoginMsg("註冊成功：" + result.user.email, false);
  }catch(err){
    console.error(err);
    setLoginMsg(err.code + " | " + err.message, true);
    alert("Signup Error: " + err.code + " | " + err.message);
  }
});

loginBtn.addEventListener("click", async function(){
  const email = loginEmail.value.trim();
  const password = loginPassword.value;

  if(!email || !password){
    setLoginMsg("請輸入 email 同 password", true);
    return;
  }

  try{
    const result = await auth.signInWithEmailAndPassword(email, password);
    setLoginMsg("登入成功：" + result.user.email, false);
  }catch(err){
    console.error(err);
    setLoginMsg(err.code + " | " + err.message, true);
    alert("Login Error: " + err.code + " | " + err.message);
  }
});

function logout(){
  auth.signOut().then(function(){
    loginPassword.value = "";
    setLoginMsg("已登出", false);
  }).catch(function(err){
    alert("Logout Error: " + err.code + " | " + err.message);
  });
}

auth.onAuthStateChanged(function(user){
  if(user){
    loginWrap.style.display = "none";
    appWrap.style.display = "block";
    if(currentUserLine){
      currentUserLine.textContent = "目前登入：" + (user.email || "");
    }
    setLoginMsg("");
    initData();
  }else{
    loginWrap.style.display = "flex";
    appWrap.style.display = "none";
  }
});

function seedDefaultsOnce(){
  db.ref("meta/seeded").once("value").then(function(s){
    if(s.exists()) return;

    const foodUpdates = {};
    defaultFoods.forEach(function(name){
      const key = db.ref("foods").push().key;
      foodUpdates[key] = name;
    });

    const stockUpdates = {};
    defaultStocks.forEach(function(item){
      const key = db.ref("stocks").push().key;
      stockUpdates[key] = item;
    });

    return Promise.all([
      db.ref("foods").set(foodUpdates),
      db.ref("stocks").set(stockUpdates),
      db.ref("meta/seeded").set(true)
    ]);
  }).catch(handleError);
}

function initData(){
  if(initialized) return;
  initialized = true;

  seedDefaultsOnce();

  const expenseDateEl = document.getElementById("expenseDate");
  if(expenseDateEl && !expenseDateEl.value){
    expenseDateEl.value = getTodayString();
  }

  document.getElementById("saveBudgetBtn").addEventListener("click", function(){
    clearError();
    const val = Number(document.getElementById("budgetInput").value || 0);
    db.ref("budget").set(val).catch(handleError);
  });

  db.ref("budget").on("value", function(s){
    budgetCache = Number(s.val() || 0);
    document.getElementById("budgetInput").value = budgetCache || "";
    document.getElementById("budgetTotal").textContent = formatMoney(budgetCache);
    updateBudgetRemain();
  }, handleError);

  document.getElementById("addExpenseBtn").addEventListener("click", function(){
    clearError();
    const amountEl = document.getElementById("amount");
    const noteEl = document.getElementById("note");
    const dateEl = document.getElementById("expenseDate");

    const amount = amountEl.value.trim();
    const note = noteEl.value.trim();
    const expenseDate = dateEl.value || getTodayString();

    if(!amount || Number(amount) <= 0) return;

    db.ref("expenses").push({
      a: amount,
      n: note,
      date: expenseDate,
      ts: Date.now()
    }).then(function(){
      amountEl.value = "";
      noteEl.value = "";
      dateEl.value = getTodayString();
    }).catch(handleError);
  });

  document.getElementById("addFoodBtn").addEventListener("click", function(){
    clearError();
    const input = document.getElementById("foodInput");
    const value = input.value.trim();
    if(!value) return;

    db.ref("foods").push(value).then(function(){
      input.value = "";
    }).catch(handleError);
  });

  document.getElementById("drawBtn").addEventListener("click", drawFood);
  document.getElementById("redrawBtn").addEventListener("click", drawFood);

  document.getElementById("addStockBtn").addEventListener("click", function(){
    clearError();
    const input = document.getElementById("stockInput");
    const value = input.value.trim();
    if(!value) return;

    db.ref("stocks").push({
      name: value,
      on: true
    }).then(function(){
      input.value = "";
    }).catch(handleError);
  });

  const memoInput = document.getElementById("memoInput");
  const memoStatus = document.getElementById("memoStatus");

  memoInput.addEventListener("input", function(){
    clearError();
    clearTimeout(memoTypingTimer);
    memoTypingTimer = setTimeout(function(){
      db.ref("memo").set({
        text: memoInput.value,
        updatedAt: Date.now()
      }).catch(handleError);
    }, 180);
  });

  document.getElementById("clearMemoBtn").addEventListener("click", function(){
    clearError();
    db.ref("memo").set({
      text: "",
      updatedAt: Date.now()
    }).catch(handleError);
  });

  db.ref("expenses").on("value", function(s){
    expenseCache = s.val() || {};
    const listEl = document.getElementById("expenseList");
    const totalEl = document.getElementById("expenseTotal");
    const latestEl = document.getElementById("expenseLatest");

    const rows = valuesFromObject(expenseCache).sort(function(a,b){
      return (b.value.ts || 0) - (a.value.ts || 0);
    });

    if(rows.length === 0){
      listEl.innerHTML = '<div class="empty">未有開支記錄</div>';
      totalEl.textContent = "$0";
      latestEl.textContent = "最新記錄：—";
      updateBudgetRemain();
      return;
    }

    const total = rows.reduce(function(sum, row){
      return sum + Number(row.value.a || 0);
    }, 0);

    totalEl.textContent = formatMoney(total);
    updateBudgetRemain();

    const latest = rows[0].value;
    latestEl.textContent = "最新記錄：" + (latest.n ? latest.n : formatMoney(latest.a));

    listEl.innerHTML = rows.map(function(row){
      const dateText = row.value.date ? row.value.date : "";
      return '<div class="item"><div class="item-main"><div class="item-title">' + formatMoney(row.value.a) + '</div><div class="item-sub">' + (row.value.n ? escapeHtml(row.value.n) : "無備註") + (dateText ? "｜" + escapeHtml(dateText) : "") + '</div></div><div class="item-right"><button class="small-btn" onclick="deleteExpense(\\'' + row.id + '\\')">刪除</button></div></div>';
    }).join("");
  }, handleError);

  db.ref("foods").on("value", function(s){
    foodCache = s.val() || {};
    const listEl = document.getElementById("foodList");
    const rows = valuesFromObject(foodCache);

    if(rows.length === 0){
      listEl.innerHTML = '<div class="empty">未有菜式</div>';
      return;
    }

    listEl.innerHTML = rows.reverse().map(function(row){
      return '<div class="item"><div class="item-main"><div class="item-title">' + escapeHtml(row.value) + '</div></div><div class="item-right"><button class="small-btn" onclick="deleteFood(\\'' + row.id + '\\')">刪除</button></div></div>';
    }).join("");
  }, handleError);

  db.ref("stocks").on("value", function(s){
    stockCache = s.val() || {};
    const listEl = document.getElementById("stockList");
    const rows = valuesFromObject(stockCache);

    if(rows.length === 0){
      listEl.innerHTML = '<div class="empty">未有存貨項目</div>';
      return;
    }

    listEl.innerHTML = rows.reverse().map(function(row){
      const item = row.value || {};
      const name = typeof item === "string" ? item : item.name;
      const on = typeof item === "string" ? true : !!item.on;

      return '<div class="item"><div class="item-main"><div class="item-title">' + escapeHtml(name) + '</div><div class="item-sub">' + (on ? "屋企有" : "屋企冇") + '</div></div><div class="item-right"><label class="toggle"><input type="checkbox" ' + (on ? "checked" : "") + ' onchange="toggleStock(\\'' + row.id + '\\')"><span class="slider"></span></label><button class="small-btn" onclick="deleteStock(\\'' + row.id + '\\')">刪除</button></div></div>';
    }).join("");
  }, handleError);

  db.ref("memo").on("value", function(s){
    const data = s.val() || { text:"", updatedAt:null };
    if(document.activeElement !== memoInput){
      memoInput.value = data.text || "";
    }
    memoStatus.textContent = "最後更新：" + formatDateTime(data.updatedAt);
  }, handleError);
}

function deleteExpense(id){
  clearError();
  db.ref("expenses/" + id).remove().catch(handleError);
}

function deleteFood(id){
  clearError();
  db.ref("foods/" + id).remove().catch(handleError);
}

function drawFood(){
  const rows = valuesFromObject(foodCache);
  if(rows.length === 0){
    document.getElementById("resultDisplay").textContent = "請先加入菜式";
    return;
  }

  const names = rows.map(function(row){ return row.value; });
  const display = document.getElementById("resultDisplay");
  let count = 0;
  const timer = setInterval(function(){
    display.textContent = names[Math.floor(Math.random() * names.length)];
    count++;
    if(count > 12){
      clearInterval(timer);
      display.style.color = "#ff4d4f";
      setTimeout(function(){
        display.style.color = "var(--primary)";
      }, 900);
    }
  }, 60);
}

function toggleStock(id){
  clearError();
  const item = stockCache[id];
  if(!item) return;
  db.ref("stocks/" + id + "/on").set(!item.on).catch(handleError);
}

function deleteStock(id){
  clearError();
  db.ref("stocks/" + id).remove().catch(handleError);
}

window.deleteExpense = deleteExpense;
window.deleteFood = deleteFood;
window.toggleStock = toggleStock;
window.deleteStock = deleteStock;
window.logout = logout;
</script>
</body>
</html>
