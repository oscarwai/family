<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#f2f2f7" />
  <title>家庭小工具</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <style>
    :root {
      --ios-blue: #007aff;
      --ios-blue-soft: #eaf3ff;
      --ios-red: #ff3b30;
      --ios-orange: #ff9500;
      --ios-green: #34c759;
      --bg: #f2f2f7;
      --card: #ffffff;
      --text: #111111;
      --subtext: #6e6e73;
      --line: rgba(60, 60, 67, 0.12);
      --line-strong: rgba(60, 60, 67, 0.2);
      --tab-h: 84px;
      --swipe-width: 88px;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang TC",
        "Microsoft JhengHei", "Helvetica Neue", Arial, sans-serif;
    }

    body {
      overscroll-behavior-y: none;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app-shell {
      max-width: 560px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 0 0 calc(var(--tab-h) + env(safe-area-inset-bottom));
      background: var(--bg);
    }

    .screen {
      display: none;
      padding: 12px 14px 18px;
    }

    .screen.active {
      display: block;
    }

    .login-wrap {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 32px 16px;
      display: flex;
      align-items: center;
    }

    .hero-title {
      font-size: 34px;
      font-weight: 800;
      line-height: 1.06;
      letter-spacing: -0.02em;
      margin: 0 0 6px;
    }

    .hero-sub {
      font-size: 14px;
      color: var(--subtext);
      line-height: 1.45;
      margin: 0 0 18px;
    }

    .panel {
      background: var(--card);
      border-radius: 22px;
      padding: 16px;
      border: 1px solid var(--line);
    }

    .panel + .panel {
      margin-top: 12px;
    }

    .header-block {
      padding: 8px 2px 10px;
    }

    .page-title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.08;
      margin: 0;
    }

    .page-sub {
      margin-top: 6px;
      font-size: 13px;
      color: var(--subtext);
      line-height: 1.45;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .section-meta {
      font-size: 12px;
      color: var(--subtext);
      text-align: right;
      line-height: 1.35;
    }

    .field {
      margin-bottom: 12px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .label {
      font-size: 12px;
      font-weight: 600;
      color: var(--subtext);
      margin-bottom: 8px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--text);
      padding: 14px;
      font-size: 16px;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(0, 122, 255, 0.35);
      box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.08);
    }

    textarea {
      resize: none;
      min-height: 92px;
      line-height: 1.5;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row > * {
      flex: 1;
      min-width: 0;
    }

    .inline-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .inline-row > *:first-child {
      flex: 1;
      min-width: 0;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
      cursor: pointer;
      background: var(--ios-blue);
      color: #fff;
      width: 100%;
    }

    .btn-soft {
      background: #f2f7ff;
      color: var(--ios-blue);
    }

    .btn-plain {
      background: #f5f5f7;
      color: var(--text);
    }

    .btn-danger {
      background: #fff2f1;
      color: var(--ios-red);
    }

    .btn-green {
      background: var(--ios-green);
      color: #fff;
    }

    .btn-mini {
      width: auto;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
      flex: 0 0 auto;
    }

    .icon-btn {
      width: auto;
      padding: 10px 12px;
      border-radius: 12px;
      background: #f5f5f7;
      color: var(--text);
      font-size: 13px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      width: auto;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      line-height: 1;
    }

    .chip.active {
      background: var(--ios-blue-soft);
      color: var(--ios-blue);
      border-color: rgba(0, 122, 255, 0.12);
    }

    .manage-list {
      display: none;
      margin-top: 12px;
      gap: 8px;
      flex-direction: column;
    }

    .manage-list.show {
      display: flex;
    }

    .manage-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: #fafafc;
      border: 1px solid var(--line);
    }

    .manage-name {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.35;
      word-break: break-word;
    }

    .hero-result {
      padding: 22px 16px;
      border-radius: 22px;
      background: linear-gradient(180deg, #f7fbff 0%, #eef5ff 100%);
      border: 1px solid #dfeafc;
      text-align: center;
    }

    .hero-result-label {
      font-size: 12px;
      color: var(--subtext);
      margin-bottom: 8px;
    }

    .hero-result-main {
      min-height: 42px;
      font-size: 31px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--ios-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      word-break: break-word;
    }

    .hero-result-sub {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--subtext);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: var(--subtext);
      line-height: 1.45;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty {
      padding: 18px 14px;
      border-radius: 16px;
      border: 1px dashed var(--line-strong);
      color: var(--subtext);
      text-align: center;
      font-size: 14px;
      background: #fafafc;
    }

    .swipe-row {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .swipe-actions {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: var(--swipe-width);
      display: flex;
    }

    .swipe-delete-btn {
      border-radius: 0;
      background: var(--ios-red);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      width: 100%;
    }

    .swipe-content {
      position: relative;
      z-index: 1;
      background: #fff;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transform: translateX(0);
      transition: transform 0.2s ease;
      touch-action: pan-y;
    }

    .swipe-row.open .swipe-content {
      transform: translateX(calc(var(--swipe-width) * -1));
    }

    .cell-main {
      flex: 1;
      min-width: 0;
    }

    .cell-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
      word-break: break-word;
      letter-spacing: -0.01em;
    }

    .cell-sub {
      margin-top: 5px;
      font-size: 13px;
      line-height: 1.45;
      color: var(--subtext);
      word-break: break-word;
    }

    .cell-price {
      flex: 0 0 auto;
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
      letter-spacing: -0.01em;
    }

    .qty-wrap {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn {
      width: 30px;
      height: 30px;
      padding: 0;
      border-radius: 50%;
      background: #eef1f5;
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
    }

    .qty-num {
      min-width: 24px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
    }

    .low {
      color: var(--ios-red);
      font-weight: 700;
    }

    .warn {
      color: var(--ios-orange);
      font-weight: 700;
    }

    .tabbar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .tabbar-inner {
      width: min(560px, 100%);
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      background: rgba(249, 249, 249, 0.86);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--line);
      pointer-events: auto;
    }

    .tab-btn {
      background: transparent;
      color: var(--subtext);
      padding: 8px 4px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .tab-btn.active {
      color: var(--ios-blue);
    }

    .tab-icon {
      font-size: 17px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div id="loginWrap" class="login-wrap">
    <div class="panel" style="width:100%;">
      <h1 class="hero-title">登入</h1>
      <div class="hero-sub">只限指定帳戶使用。</div>

      <div class="field">
        <div class="label">Email</div>
        <input id="loginEmail" type="email" placeholder="你的 Gmail" />
      </div>

      <div class="field">
        <div class="label">Password</div>
        <input id="loginPassword" type="password" placeholder="密碼" />
      </div>

      <button id="loginBtn">登入</button>
      <div id="loginMsg" class="hero-sub" style="margin-top:12px;"></div>
    </div>
  </div>

  <div id="appWrap" style="display:none;">
    <div class="app-shell">
      <div id="errorBanner" class="panel" style="display:none;margin:12px 14px 0;"></div>

      <section id="page-dinner" class="screen active">
        <div class="header-block">
          <div class="topbar">
            <div>
              <h1 class="page-title">今晚煮咩</h1>
              <div class="page-sub">以晚餐決策為核心，日常操作放前，管理操作收起。</div>
            </div>
            <button id="logoutBtn1" class="icon-btn">登出</button>
          </div>
        </div>

        <div class="panel">
          <div class="section-head">
            <div class="section-title">選類別</div>
            <div id="currentDinnerCatLabel" class="section-meta">未選擇</div>
          </div>

          <div class="chips" id="dinnerCatGrid"></div>

          <div style="height:12px;"></div>

          <div class="inline-row">
            <input id="newDinnerCatInput" type="text" placeholder="新增大類別，例如：湯類、宵夜、日式" />
            <button id="addDinnerCatBtn" class="btn-mini">新增</button>
          </div>

          <div style="height:10px;"></div>
          <button id="toggleDinnerManageBtn" class="btn-soft">管理分類</button>
          <div id="dinnerCatManageList" class="manage-list"></div>
        </div>

        <div class="panel">
          <div class="hero-result">
            <div class="hero-result-label">抽選結果</div>
            <div id="resultDisplay" class="hero-result-main">請先選大類別</div>
            <div id="resultDesc" class="hero-result-sub"></div>
          </div>

          <div style="height:12px;"></div>

          <div class="row">
            <button id="drawBtn" class="btn-green">隨機抽選</button>
            <button id="redrawBtn" class="btn-soft">再抽一次</button>
          </div>

          <div style="height:10px;"></div>
          <button id="resetTodayBtn" class="btn-soft">重置今日抽過</button>

          <div class="hint">再抽一次不重複上一次；今日抽過可重置。</div>
        </div>

        <div class="panel">
          <div class="section-head">
            <div class="section-title">新增菜式</div>
            <div id="dinnerManageLabel" class="section-meta">管理類別：未選擇</div>
          </div>

          <div class="field">
            <div class="label">菜式名稱</div>
            <input id="foodInput" type="text" placeholder="例如：洋蔥牛仔骨" />
          </div>

          <div class="field">
            <div class="label">簡單煮法</div>
            <textarea id="foodDescInput" placeholder="例如：先醃牛仔骨，煎香後加洋蔥炒至軟身"></textarea>
          </div>

          <button id="addFoodBtn">新增菜式</button>
        </div>

        <div class="panel">
          <div class="section-head">
            <div class="section-title">菜式清單</div>
            <div id="dinnerListLabel" class="section-meta">管理類別：未選擇</div>
          </div>
          <div id="foodList" class="list"></div>
        </div>
      </section>

      <section id="page-stock" class="screen">
        <div class="header-block">
          <div class="topbar">
            <div>
              <h1 class="page-title">存貨</h1>
              <div class="page-sub">類別清楚、操作簡單，低庫存即時可見。</div>
            </div>
            <button id="logoutBtn2" class="icon-btn">登出</button>
          </div>
        </div>

        <div class="panel">
          <div class="section-head">
            <div class="section-title">選類別</div>
            <div id="currentStockCatLabel" class="section-meta">未選擇</div>
          </div>

          <div class="chips" id="stockCatGrid"></div>

          <div style="height:12px;"></div>

          <div class="inline-row">
            <input id="newStockCatInput" type="text" placeholder="新增類別，例如：零食、早餐、冷凍食品" />
            <button id="addStockCatBtn" class="btn-mini">新增</button>
          </div>

          <div style="height:10px;"></div>
          <button id="toggleStockManageBtn" class="btn-soft">管理類別</button>
          <div id="stockCatManageList" class="manage-list"></div>
        </div>

        <div class="panel">
          <div class="section-head">
            <div class="section-title">新增項目</div>
            <div id="stockManageLabel" class="section-meta">管理類別：未選擇</div>
          </div>

          <div class="field">
            <div class="label">項目名稱</div>
            <input id="stockInput" type="text" placeholder="例如：可樂、雞翼、廁紙" />
          </div>

          <button id="addStockBtn">新增</button>
        </div>

        <div class="panel">
          <div class="section-head">
            <div class="section-title">項目清單</div>
            <div id="stockListLabel" class="section-meta">管理類別：未選擇</div>
          </div>
          <div id="stockList" class="list"></div>
        </div>
      </section>

      <section id="page-price" class="screen">
        <div class="header-block">
          <div class="topbar">
            <div>
              <h1 class="page-title">價格</h1>
              <div class="page-sub">輸入食物價格，之後可以即時搜尋返。</div>
            </div>
            <button id="logoutBtn3" class="icon-btn">登出</button>
          </div>
        </div>

        <div class="panel">
          <div class="field" style="margin-bottom:0;">
            <div class="label">搜尋</div>
            <input id="priceSearchInput" type="text" placeholder="搜尋食物名稱 / 商店 / 備註" />
          </div>
        </div>

        <div class="panel">
          <div class="field">
            <div class="label">食物名稱</div>
            <input id="priceNameInput" type="text" placeholder="例如：雞蛋、可樂、菜心" />
          </div>

          <div class="row">
            <div class="field">
              <div class="label">價格</div>
              <input id="priceValueInput" type="number" step="0.1" placeholder="例如：25.9" />
            </div>
            <div class="field">
              <div class="label">日期</div>
              <input id="priceDateInput" type="date" />
            </div>
          </div>

          <div class="field">
            <div class="label">商店</div>
            <input id="priceStoreInput" type="text" placeholder="例如：百佳、惠康、街市" />
          </div>

          <div class="field">
            <div class="label">備註</div>
            <textarea id="priceNoteInput" placeholder="例如：特價、兩件裝、街市檔口"></textarea>
          </div>

          <button id="addPriceBtn">新增價格記錄</button>
        </div>

        <div class="panel">
          <div class="section-head">
            <div class="section-title">價格記錄</div>
            <div id="priceCountLabel" class="section-meta">0 項</div>
          </div>
          <div id="priceList" class="list"></div>
        </div>
      </section>

      <section id="page-memo" class="screen">
        <div class="header-block">
          <div class="topbar">
            <div>
              <h1 class="page-title">備忘</h1>
              <div class="page-sub">快速記低，之後再返嚟睇。</div>
            </div>
            <button id="logoutBtn4" class="icon-btn">登出</button>
          </div>
        </div>

        <div class="panel">
          <div class="field">
            <div class="label">新增備忘</div>
            <textarea id="memoInput" placeholder="例如：今晚記得解凍雞翼"></textarea>
          </div>
          <button id="addMemoBtn">新增備忘</button>
        </div>

        <div class="panel">
          <div class="section-head">
            <div class="section-title">備忘清單</div>
            <div id="memoCountLabel" class="section-meta">0 項</div>
          </div>
          <div id="memoList" class="list"></div>
        </div>
      </section>
    </div>

    <nav class="tabbar">
      <div class="tabbar-inner">
        <button class="tab-btn active" data-page="dinner">
          <div class="tab-icon">🍽</div>
          <div>晚餐</div>
        </button>
        <button class="tab-btn" data-page="stock">
          <div class="tab-icon">📦</div>
          <div>存貨</div>
        </button>
        <button class="tab-btn" data-page="price">
          <div class="tab-icon">🏷️</div>
          <div>價格</div>
        </button>
        <button class="tab-btn" data-page="memo">
          <div class="tab-icon">📝</div>
          <div>備忘</div>
        </button>
      </div>
    </nav>
  </div>

      function setError(msg) {

        }

      function todayStr() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + day;
      }

      function timeStr(ts) {
        if (!ts) return "未有內容";
        const d = new Date(ts);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        const h = String(d.getHours()).padStart(2, "0");
        const min = String(d.getMinutes()).padStart(2, "0");
        return y + "/" + m + "/" + day + " " + h + ":" + min;
      }

      function money(n) {
        return "$" + Number(n || 0).toLocaleString("en-US", {
          maximumFractionDigits: 2
        });
      }

      function esc(str) {
        return String(str || "").replace(/[&<>"']/g, function (s) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
          }[s];
        });
      }

      function rowsFromObj(obj) {
        return Object.keys(obj || {}).map(function (k) {
          return { id: k, value: obj[k] };
        });
      }

      function closeAllSwipes() {
        openSwipeKey = null;
        document.querySelectorAll(".swipe-row.open").forEach(function (el) {
          el.classList.remove("open");
        });
      }

      function showPage(pageName, btn) {
        document.querySelectorAll(".screen").forEach(function (el) {
          el.classList.remove("active");
        });
        document.getElementById("page-" + pageName).classList.add("active");

        document.querySelectorAll(".tab-btn").forEach(function (el) {
          el.classList.remove("active");
        });
        btn.classList.add("active");

        closeAllSwipes();
      }

      function getDinnerCatName(id) {
        return dinnerCategoriesCache[id] ? dinnerCategoriesCache[id].name : "未選擇";
      }

      function getStockCatName(id) {
        return stockCategoriesCache[id] ? stockCategoriesCache[id].name : "未選擇";
      }

      function ensureCurrentCats() {
        const dinnerIds = Object.keys(dinnerCategoriesCache || {});
        const stockIds = Object.keys(stockCategoriesCache || {});

        if (!currentDinnerCat || !dinnerIds.includes(currentDinnerCat)) {
          currentDinnerCat = dinnerIds[0] || null;
        }

        if (!currentStockCat || !stockIds.includes(currentStockCat)) {
          currentStockCat = stockIds[0] || null;
        }

        selectedDinnerCats = selectedDinnerCats.filter(function (id) {
          return dinnerIds.includes(id);
        });

        if (selectedDinnerCats.length === 0 && currentDinnerCat) {
          selectedDinnerCats = [currentDinnerCat];
        }
      }

        ensureCurrentCats();

        const rows = rowsFromObj(dinnerCategoriesCache);

        els.dinnerCatGrid.innerHTML = rows.map(function (row) {
          const active = selectedDinnerCats.includes(row.id) ? " active" : "";
          return `<button class="chip${active}" data-dinner-cat="${row.id}">${esc(row.value.name)}</button>`;
        }).join("");

        els.dinnerCatManageList.innerHTML = rows.map(function (row) {
          return `
            <div class="manage-row">
              <div class="manage-name">${esc(row.value.name)}</div>
              <button class="btn-mini btn-danger" data-del-dinner-cat="${row.id}" style="width:auto;">刪除</button>
            </div>

        els.dinnerCatManageList.classList.toggle("show", isDinnerManageOpen);
        els.toggleDinnerManageBtn.textContent = isDinnerManageOpen ? "收起管理" : "管理分類";

          els.currentDinnerCatLabel.textContent = "未選擇";
        } else {

      async function doLogin() {
        const email = els.loginEmail.value.trim();
        const password = els.loginPassword.value;

        if (!email || !password) {
          setLoginMsg("請輸入 email 同 password");
          return;
        }

        if (!ALLOWED_EMAILS.includes(email)) {
          setLoginMsg("此帳戶不允許登入");
          return;
        }

        try {
          await auth.signInWithEmailAndPassword(email, password);
          setLoginMsg("");
        } catch (err) {
          setLoginMsg(err.code + " | " + err.message);
          alert("Login Error: " + err.code + " | " + err.message);
        }
      }

      async function doLogout() {
        try {
          await auth.signOut();
          els.loginPassword.value = "";
          setLoginMsg("已登出");

          alert("Logout Error: " + err.code + " | " + err.message);

      async function addDinnerCategory() {
        try {
          const name = els.newDinnerCatInput.value.trim();
          if (!name) return;

          const ref = db.ref("dinnerCategories").push();
          await ref.set({ name: name });

          currentDinnerCat = ref.key;
          if (!selectedDinnerCats.includes(ref.key)) {
            selectedDinnerCats.push(ref.key);
          }

          els.newDinnerCatInput.value = "";
        } catch (err) {
          alert(err.code + " | " + err.message);
        }

      async function deleteDinnerCategory(id) {
        const name = getDinnerCatName(id);
        if (!confirm("確定刪除晚餐大類別「" + name + "」及入面所有菜式？")) return;

        try {
          await Promise.all([
            db.ref("dinnerCategories/" + id).remove(),
            db.ref("dinnerItems/" + id).remove()
          ]);

          selectedDinnerCats = selectedDinnerCats.filter(function (x) {
            return x !== id;
          });

          if (currentDinnerCat === id) {
            const remaining = Object.keys(dinnerCategoriesCache).filter(function (x) {
              return x !== id;
            });
            currentDinnerCat = remaining[0] || null;
          }

          Object.keys(excludedToday).forEach(function (key) {
            if (key.startsWith(id + "__")) delete excludedToday[key];
          });

          if (lastDrawKey && lastDrawKey.startsWith(id + "__")) {
            lastDrawKey = null;
          }
        } catch (err) {
          alert(err.code + " | " + err.message);
        }
      }

        try {
          if (!currentDinnerCat) {
            alert("請先新增或選擇管理類別");
            return;
          }

          const name = els.foodInput.value.trim();
          const desc = els.foodDescInput.value.trim();
          if (!name) return;

          await db.ref("dinnerItems/" + currentDinnerCat).push({
            name: name,
            desc: desc
          });

          els.foodInput.value = "";
          els.foodDescInput.value = "";
        } catch (err) {
          alert(err.code + " | " + err.message);
        }
      }

      function drawFood(isRedraw) {
        if (selectedDinnerCats.length === 0) {
          els.resultDisplay.textContent = "請先選大類別";
          els.resultDesc.textContent = "";
          return;
        }

        let pool = [];

        selectedDinnerCats.forEach(function (cat) {
          const rows = rowsFromObj(dinnerItemsCache[cat] || {});
          rows.forEach(function (row) {
            const excludeKey = cat + "__" + row.id;
            if (!excludedToday[excludeKey]) {
              pool.push({
                ...row.value,
                id: row.id,
                cat: cat,
                excludeKey: excludeKey
              });
            }
          });
        });

        if (isRedraw && lastDrawKey && pool.length > 1) {
          pool = pool.filter(function (item) {
            return item.excludeKey !== lastDrawKey;
          });
        }

        if (pool.length === 0) {
          els.resultDisplay.textContent = "今日已抽晒";
          els.resultDesc.textContent = "";
          return;
        }

        const picked = pool[Math.floor(Math.random() * pool.length)];
        const names = pool.map(function (item) {
          return item.name || "";
        });

        let count = 0;
        const timer = setInterval(function () {
          els.resultDisplay.textContent =
            names[Math.floor(Math.random() * names.length)] || "未有結果";
          els.resultDesc.textContent = "";
          count++;
          if (count > 12) {
            clearInterval(timer);
            excludedToday[picked.excludeKey] = true;
            lastDrawKey = picked.excludeKey;
            els.resultDisplay.textContent = picked.name || "未有結果";
            els.resultDesc.textContent = picked.desc || "";
          }
        }, 60);
      }

      function resetToday() {
        excludedToday = {};
        lastDrawKey = null;
        els.resultDisplay.textContent = "已重置今日抽過";
        els.resultDesc.textContent = "";
      }

      }

      async function deleteStockCategory(id) {
        const name = getStockCatName(id);
        if (!confirm("確定刪除存貨類別「" + name + "」及入面所有項目？")) return;

        try {
          await Promise.all([
            db.ref("stockCategories/" + id).remove(),
            db.ref("stockItems/" + id).remove()
          ]);

          if (currentStockCat === id) {
            const remaining = Object.keys(stockCategoriesCache).filter(function (x) {
              return x !== id;
            });
            currentStockCat = remaining[0] || null;
          }
        } catch (err) {
          alert(err.code + " | " + err.message);
        }
      }

      async function addStock() {
        try {
          if (!currentStockCat) {
            alert("請先新增或選擇存貨類別");
            return;
          }

          const val = els.stockInput.value.trim();
          if (!val) return;

          await db.ref("stockItems/" + currentStockCat).push({
            name: val,
            qty: 1
          });

          els.stockInput.value = "";
        } catch (err) {
          alert(err.code + " | " + err.message);
        }
      }

      async function addPrice() {
        try {
          const name = els.priceNameInput.value.trim();
          const price = Number(els.priceValueInput.value || 0);
          const date = els.priceDateInput.value || todayStr();
          const store = els.priceStoreInput.value.trim();
          const note = els.priceNoteInput.value.trim();

          if (!name || !price) return;

          await db.ref("foodPrices").push({
            name: name,
            price: price,
            date: date,
            store: store,
            note: note,
            ts: Date.now()
          });

          els.priceNameInput.value = "";
          els.priceValueInput.value = "";
          els.priceDateInput.value = todayStr();
          els.priceStoreInput.value = "";
          els.priceNoteInput.value = "";
        } catch (err) {
          alert(err.code + " | " + err.message);
        }
      }

      async function addMemo() {
        try {
          const text = els.memoInput.value.trim();
          if (!text) return;

          await db.ref("memos").push({
            text: text,
            ts: Date.now()
          });

          els.memoInput.value = "";
        } catch (err) {
          alert(err.code + " | " + err.message);
        }
      }

      els.loginBtn.addEventListener("click", doLogin);

      document.getElementById("logoutBtn1").addEventListener("click", doLogout);
      document.getElementById("logoutBtn2").addEventListener("click", doLogout);
      document.getElementById("logoutBtn3").addEventListener("click", doLogout);
      document.getElementById("logoutBtn4").addEventListener("click", doLogout);

      els.addDinnerCatBtn.addEventListener("click", addDinnerCategory);
      els.toggleDinnerManageBtn.addEventListener("click", function () {
        isDinnerManageOpen = !isDinnerManageOpen;
        renderDinnerCategories();
      });
      els.drawBtn.addEventListener("click", function () { drawFood(false); });
      els.redrawBtn.addEventListener("click", function () { drawFood(true); });
      els.resetTodayBtn.addEventListener("click", resetToday);
      els.addFoodBtn.addEventListener("click", addFood);

      els.addStockCatBtn.addEventListener("click", addStockCategory);
      els.toggleStockManageBtn.addEventListener("click", function () {
        isStockManageOpen = !isStockManageOpen;
        renderStockCategories();
      });
      els.addStockBtn.addEventListener("click", addStock);

      els.addPriceBtn.addEventListener("click", addPrice);
      els.priceSearchInput.addEventListener("input", renderPrices);

      els.addMemoBtn.addEventListener("click", addMemo);

      document.querySelectorAll(".tab-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          showPage(btn.dataset.page, btn);
        });
      });

      els.dinnerCatGrid.addEventListener("click", function (e) {
        const cat = e.target.getAttribute("data-dinner-cat");
        if (!cat) return;

        currentDinnerCat = cat;

        if (selectedDinnerCats.includes(cat)) {
          selectedDinnerCats = selectedDinnerCats.filter(function (id) {
            return id !== cat;
          });
        } else {
          selectedDinnerCats.push(cat);
        }

        closeAllSwipes();
        renderDinnerCategories();
        renderDinnerItems();
      });

      els.dinnerCatManageList.addEventListener("click", function (e) {
        const delId = e.target.getAttribute("data-del-dinner-cat");
        if (delId) {
          deleteDinnerCategory(delId);
        }
      });

      els.stockCatGrid.addEventListener("click", function (e) {
        const cat = e.target.getAttribute("data-stock-cat");
        if (!cat) return;

        currentStockCat = cat;
        closeAllSwipes();
        renderStockCategories();
        renderStocks();
      });

      els.stockCatManageList.addEventListener("click", function (e) {
        const delId = e.target.getAttribute("data-del-stock-cat");
        if (delId) {
          deleteStockCategory(delId);
        }
      });

      els.foodList.addEventListener("click", async function (e) {
        const id = e.target.getAttribute("data-del-food");
        if (!id) return;

        try {
          await db.ref("dinnerItems/" + currentDinnerCat + "/" + id).remove();

          const drawKey = currentDinnerCat + "__" + id;
          if (lastDrawKey === drawKey) {
            lastDrawKey = null;
          }
          delete excludedToday[drawKey];

          if (openSwipeKey === "food:" + currentDinnerCat + ":" + id) {
            openSwipeKey = null;
          }
        } catch (err) {
          alert(err.code + " | " + err.message);
        }
      });

      els.stockList.addEventListener("click", async function (e) {
        const delId = e.target.getAttribute("data-del-stock");
        if (delId) {
          try {
            await db.ref("stockItems/" + currentStockCat + "/" + delId).remove();
            if (openSwipeKey === "stock:" + currentStockCat + ":" + delId) {
              openSwipeKey = null;
            }
          } catch (err) {
            alert(err.code + " | " + err.message);
          }
          return;
        }

        const plusId = e.target.getAttribute("data-plus-stock");
        if (plusId) {
          try {
            const item = (stockItemsCache[currentStockCat] || {})[plusId];
            const qty = Number((item && item.qty) || 0) + 1;
            await db.ref("stockItems/" + currentStockCat + "/" + plusId + "/qty").set(qty);
          } catch (err) {
            alert(err.code + " | " + err.message);
          }
          return;
        }

        const minusId = e.target.getAttribute("data-minus-stock");
        if (minusId) {
          try {
            const item = (stockItemsCache[currentStockCat] || {})[minusId];
            const qty = Math.max(0, Number((item && item.qty) || 0) - 1);
            await db.ref("stockItems/" + currentStockCat + "/" + minusId + "/qty").set(qty);
          } catch (err) {
            alert(err.code + " | " + err.message);
          }
        }
      });

      els.priceList.addEventListener("click", async function (e) {
        const id = e.target.getAttribute("data-del-price");
        if (!id) return;

        try {
          await db.ref("foodPrices/" + id).remove();
          if (openSwipeKey === "price:" + id) {
            openSwipeKey = null;
          }
        } catch (err) {
          alert(err.code + " | " + err.message);
        }
      });

      els.memoList.addEventListener("click", async function (e) {
        const id = e.target.getAttribute("data-del-memo");
        if (!id) return;

        try {
          await db.ref("memos/" + id).remove();
          if (openSwipeKey === "memo:" + id) {
            openSwipeKey = null;
          }
        } catch (err) {
          alert(err.code + " | " + err.message);
        }
      });

      function attachSwipe(container, typeName) {
        let startX = 0;
        let startY = 0;
        let touchedRow = null;
        let moved = false;

        container.addEventListener("touchstart", function (e) {
          const row = e.target.closest(".swipe-row");
          if (!row) return;
          touchedRow = row;
          startX = e.touches[0].clientX;
          startY = e.touches[0].clientY;
          moved = false;
        }, { passive: true });

        container.addEventListener("touchmove", function (e) {
          if (!touchedRow) return;
          const dx = e.touches[0].clientX - startX;
          const dy = e.touches[0].clientY - startY;
          if (Math.abs(dy) > Math.abs(dx)) return;
          moved = true;
        }, { passive: true });

        container.addEventListener("touchend", function (e) {
          if (!touchedRow) return;

          const dx = e.changedTouches[0].clientX - startX;
          const dy = e.changedTouches[0].clientY - startY;
          const fullKey = touchedRow.getAttribute("data-swipe-key");

          if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 35) {
            if (dx < 0) {
              closeAllSwipes();
              openSwipeKey = fullKey;
              touchedRow.classList.add("open");
            } else {
              touchedRow.classList.remove("open");
              if (openSwipeKey === fullKey) {
                openSwipeKey = null;
              }
            }
          } else if (!moved) {
            const insideButton = e.target.closest("button,input,label");
            if (!insideButton && openSwipeKey === fullKey) {
              openSwipeKey = null;
              renderByType(typeName);
            }
          }

          touchedRow = null;
        });
      }

      function renderByType(typeName) {
        if (typeName === "food") renderDinnerItems();
        if (typeName === "stock") renderStocks();
        if (typeName === "price") renderPrices();
        if (typeName === "memo") renderMemos();
      }

      attachSwipe(els.foodList, "food");
      attachSwipe(els.stockList, "stock");
      attachSwipe(els.priceList, "price");
      attachSwipe(els.memoList, "memo");

      document.addEventListener("click", function (e) {
        const insideSwipe = e.target.closest(".swipe-row");
        if (!insideSwipe) {
          closeAllSwipes();
        }
      });

      auth.onAuthStateChanged(function (user) {
        if (user) {
          if (!ALLOWED_EMAILS.includes(user.email)) {
            alert("你無權使用");
            auth.signOut();
            return;
          }

          els.loginWrap.style.display = "none";
          els.appWrap.style.display = "block";
          initApp();
        } else {
          els.loginWrap.style.display = "block";
          els.appWrap.style.display = "none";
        }
      });
    });
  </script>
