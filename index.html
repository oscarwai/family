<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭小工具</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{font-family:sans-serif;background:#f5f5f5;padding:20px}
input,button{width:100%;padding:10px;margin:5px 0}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px}
.item{display:flex;justify-content:space-between;margin:5px 0}
</style>
</head>

<body>

<div class="card">
<h3>家庭開支</h3>
<input id="amount" placeholder="金額">
<input id="note" placeholder="備註">
<button onclick="addExpense()">新增</button>
<div id="expenseList"></div>
</div>

<div class="card">
<h3>晚餐抽選</h3>
<button onclick="draw()">抽</button>
<div id="result"></div>
<input id="food">
<button onclick="addFood()">新增菜式</button>
<div id="foodList"></div>
</div>

<div class="card">
<h3>存貨</h3>
<input id="stock">
<button onclick="addStock()">新增</button>
<div id="stockList"></div>
</div>

<div class="card">
<h3>備忘</h3>
<textarea id="memo"></textarea>
</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyAe3A65fLSCR5OM5bS8iTc0get2vfX0HnQ",
authDomain: "family-958f6.firebaseapp.com",
databaseURL: "https://family-958f6-default-rtdb.firebaseio.com",
projectId: "family-958f6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function addExpense(){
let a=amount.value;
let n=note.value;
db.ref("expenses").push({a,n});
}

db.ref("expenses").on("value",s=>{
let html="";
s.forEach(c=>{
let v=c.val();
html+=`<div class="item">${v.a} ${v.n}</div>`;
});
expenseList.innerHTML=html;
});

function addFood(){
db.ref("foods").push(food.value);
}

db.ref("foods").on("value",s=>{
let html="";
let arr=[];
s.forEach(c=>{
arr.push(c.val());
html+=`<div>${c.val()}</div>`;
});
foodList.innerHTML=html;
window.foodArr=arr;
});

function draw(){
if(!foodArr||foodArr.length==0)return;
result.innerText=foodArr[Math.floor(Math.random()*foodArr.length)];
}

function addStock(){
db.ref("stocks").push(stock.value);
}

db.ref("stocks").on("value",s=>{
let html="";
s.forEach(c=>{
html+=`<div>${c.val()}</div>`;
});
stockList.innerHTML=html;
});

memo.oninput=()=>{
db.ref("memo").set(memo.value);
};

db.ref("memo").on("value",s=>{
memo.value=s.val()||"";
});
</script>

</body>
</html>
